<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apex AI — Try it</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F1A1B;
    --surface: #17262A;
    --surface-2: #1E2F33;
    --ink: #E8EDEC;
    --ink-soft: #8FA3A3;
    --teal-deep: #3C9C93;
    --teal-light: #8FD9CC;
    --teal-light-soft: rgba(143, 217, 204, 0.12);
    --correct: #7ED957;
    --correct-soft: rgba(126, 217, 87, 0.12);
    --incorrect: #E2665A;
    --incorrect-soft: rgba(226, 102, 90, 0.12);
    --line: rgba(143, 217, 204, 0.14);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .mono {
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
  }

  a:focus-visible,
  button:focus-visible,
  input:focus-visible,
  label:focus-visible {
    outline: 2px solid var(--teal-light);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* ---------- Hex mark (shared with home page) ---------- */
  .hex-icon { display: block; }
  .hex-icon polygon { stroke: var(--bg); stroke-width: 1.6; stroke-linejoin: round; }
  .hex-icon .f-light { fill: var(--teal-light); }
  .hex-icon .f-deep { fill: var(--teal-deep); }

  /* ---------- Nav ---------- */
  .nav {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(15, 26, 27, 0.82);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }

  .nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    text-decoration: none;
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  .brand .hex-icon { width: 26px; height: 26px; }

  .nav-links a {
    text-decoration: none;
    font-size: 14.5px;
    color: var(--ink-soft);
    transition: color 0.15s ease;
  }
  .nav-links a:hover { color: var(--ink); }

  /* ---------- Page ---------- */
  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 56px 24px 96px;
  }

  .intro {
    margin-bottom: 40px;
  }

  .eyebrow {
    margin: 0 0 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--teal-light);
  }

  h1 {
    margin: 0 0 12px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 30px;
    line-height: 1.2;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .sub {
    margin: 0;
    font-size: 15px;
    line-height: 1.55;
    color: var(--ink-soft);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 28px;
  }

  .card-title {
    margin: 0 0 20px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  /* Dropzone */
  .dropzone {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    border: 1.5px dashed var(--line);
    border-radius: 10px;
    padding: 28px 16px;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .dropzone:hover,
  .dropzone.dragover {
    border-color: var(--teal-light);
    background: var(--teal-light-soft);
  }

  .dropzone-text {
    font-size: 14px;
    color: var(--ink-soft);
  }

  .dropzone.dragover .dropzone-text {
    color: var(--teal-light);
  }

  .file-chip {
    margin-top: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 14px;
    background: var(--teal-light-soft);
    border-radius: 8px;
    font-size: 13px;
  }

  .file-chip .mono {
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .remove-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    color: var(--teal-light);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
  }

  .field { margin-top: 20px; }

  .field label {
    display: block;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    padding: 11px 13px;
    font-size: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--bg);
    color: var(--ink);
  }

  .field input::placeholder { color: #55696A; }

  .pill-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pill {
    padding: 8px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--surface-2);
    color: var(--ink-soft);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
  }

  .pill:hover { border-color: var(--teal-light); color: var(--ink); }

  .pill.is-active {
    border-color: var(--teal-light);
    background: var(--teal-light-soft);
    color: var(--teal-light);
    font-weight: 500;
  }

  .send-btn {
    width: 100%;
    margin-top: 22px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    color: #0B1414;
    background: var(--teal-light);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }

  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .send-btn:not(:disabled):hover { opacity: 0.9; transform: translateY(-1px); }

  /* Connector */
  .connector { display: flex; flex-direction: column; align-items: center; padding: 18px 0; }
  .connector-line { width: 1px; height: 20px; background: var(--line); }
  .connector-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--ink-soft); margin: 8px 0; flex-shrink: 0; }
  .connector-label { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.03em; color: var(--ink-soft); margin: 0 0 8px; }

  .connector.sending .connector-dot { background: var(--teal-light); animation: pulse 1.1s ease-in-out infinite; }
  .connector.sending .connector-line { background: var(--teal-light-soft); }
  .connector.sending .connector-label { color: var(--teal-light); }

  .connector.success .connector-dot { background: var(--correct); }
  .connector.success .connector-label { color: var(--correct); }

  .connector.error .connector-dot { background: var(--incorrect); }
  .connector.error .connector-label { color: var(--incorrect); }

  @media (prefers-reduced-motion: no-preference) {
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.6); opacity: 0.5; }
    }
  }

  /* Response */
  .response-meta { display: flex; gap: 10px; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 12px; margin-bottom: 14px; }
  .response-meta .status-pill { padding: 3px 8px; border-radius: 5px; font-weight: 500; }
  .response-meta.success .status-pill { background: var(--correct-soft); color: var(--correct); }
  .response-meta.error .status-pill { background: var(--incorrect-soft); color: var(--incorrect); }
  .response-meta .timestamp { color: var(--ink-soft); }

  .response-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .response-header .card-title { margin-bottom: 0; }

  .retake-btn {
    background: none;
    border: none;
    color: var(--teal-light);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
  }

  .response-area { min-height: 96px; }
  .response-area.is-box {
    padding: 16px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    max-height: 520px;
    overflow: auto;
  }

  .response-text { margin: 0; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
  .response-text .placeholder { color: #5C7071; font-family: 'Inter', sans-serif; }
  .response-text.error-text { color: var(--incorrect); }

  /* Loading spinner */
  .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 32px 0; }
  .spinner { width: 30px; height: 30px; border-radius: 50%; border: 3px solid var(--line); border-top-color: var(--teal-light); flex-shrink: 0; animation: spin 0.8s linear infinite; }
  
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--ink-soft); }

  /* Quiz */
  .quiz-summary { display: flex; align-items: center; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-soft); margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--line); }
  .quiz-summary.all-done { color: var(--correct); }
  .quiz-question { margin-bottom: 22px; padding-bottom: 22px; border-bottom: 1px solid var(--line); }
  .quiz-question:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .quiz-q-num { color: var(--teal-light); font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; margin-right: 8px; }
  .quiz-q-text { margin: 0 0 12px; font-size: 14.5px; font-weight: 500; line-height: 1.5; }
  
  .quiz-options { display: flex; flex-direction: column; gap: 8px; }
  .quiz-option { position: relative; text-align: left; padding: 10px 40px 10px 12px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface-2); font-size: 13.5px; font-family: 'Inter', sans-serif; color: var(--ink); cursor: pointer; transition: border-color 0.15s ease, background 0.15s ease; }
  .quiz-option:hover:not(:disabled) { border-color: var(--teal-light); background: var(--teal-light-soft); }
  .quiz-option:disabled { cursor: default; }
  .quiz-option.is-correct { border-color: var(--correct); background: var(--correct-soft); color: var(--correct); font-weight: 500; }
  .quiz-option.is-incorrect { border-color: var(--incorrect); background: var(--incorrect-soft); color: var(--incorrect); font-weight: 500; }
  
  .quiz-option.is-correct::after,
  .quiz-option.is-incorrect::after {
    content: ''; position: absolute; top: 50%; right: 12px; width: 18px; height: 18px; transform: translateY(-50%);
    clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
  }
  .quiz-option.is-correct::after { background: var(--correct); }
  .quiz-option.is-incorrect::after { background: var(--incorrect); }

  /* Confidence Radio Group */
  .confidence-group { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .confidence-title { font-size: 12px; color: var(--ink-soft); margin-right: 4px; font-family: 'JetBrains Mono', monospace; }
  .confidence-label { cursor: pointer; position: relative; }
  .confidence-label input { position: absolute; opacity: 0; width: 0; height: 0; }
  .confidence-pill {
    display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px; background: var(--surface-2); color: var(--ink-soft); font-size: 12px; font-family: 'Inter', sans-serif; transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
  }
  .confidence-label:hover .confidence-pill { border-color: var(--teal-light); color: var(--ink); }
  .confidence-label input:checked + .confidence-pill { border-color: var(--teal-light); background: var(--teal-light-soft); color: var(--teal-light); font-weight: 500; }
  .confidence-label input:focus-visible + .confidence-pill { outline: 2px solid var(--teal-light); outline-offset: 2px; }

  .quiz-explanation { margin: 14px 0 0; padding: 10px 12px; background: var(--bg); border-left: 3px solid var(--teal-light); border-radius: 6px; font-size: 13px; line-height: 1.5; color: var(--ink-soft); }

  .submit-quiz-btn { width: 100%; margin-top: 12px; padding: 13px; font-size: 14px; font-weight: 600; font-family: inherit; color: #0B1414; background: var(--teal-light); border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.15s ease, transform 0.15s ease; }
  .submit-quiz-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .submit-quiz-btn:not(:disabled):hover { opacity: 0.9; transform: translateY(-1px); }

  #response-card { margin-top: 4px; }

  /* ---------- Flashcards ---------- */
  .flashcard-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 10px 0;
  }
  
  .flashcard-header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--ink-soft);
  }
  
  .flashcard {
    background-color: transparent;
    width: 100%;
    height: 380px; 
    perspective: 1000px;
    cursor: pointer;
  }

  .flashcard-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
    transform-style: preserve-3d;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    border-radius: 12px;
  }

  .flashcard.flipped .flashcard-inner {
    transform: rotateY(180deg);
  }

  .flashcard-front, .flashcard-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    padding: 30px;
    border-radius: 12px;
    border: 1px solid var(--line);
    overflow-y: auto;
    white-space: pre-wrap; 
    text-align: left; 
  }

  .flashcard-front {
    background: var(--surface-2);
    color: var(--teal-light);
    font-weight: 500;
    font-size: 15px;
    line-height: 1.5;
    align-items: flex-start;
    justify-content: flex-start;
  }

  .flashcard-back {
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    transform: rotateY(180deg);
    align-items: flex-start;
    justify-content: flex-start;
  }
  
  .flashcard-hint {
    position: absolute;
    bottom: 16px;
    left: 0;
    width: 100%;
    text-align: center;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink-soft);
    opacity: 0.6;
    pointer-events: none;
  }

  .flashcard-controls {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .fc-btn {
    background: var(--surface-2);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 8px 16px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .fc-btn:hover:not(:disabled) {
    border-color: var(--teal-light);
    color: var(--teal-light);
  }

  .fc-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  
  .download-csv-btn {
    background: none;
    border: none;
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
    margin-top: 10px;
    transition: color 0.15s ease;
  }
  
  .download-csv-btn:hover {
    color: var(--teal-light);
  }

  /* ---------- Retrospective UI ---------- */
  .retro-container {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px dashed var(--line);
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  
  .retro-prompt {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.4;
  }
  
  .retro-textarea {
    width: 100%;
    min-height: 64px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--ink);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    resize: vertical;
  }
  
  .retro-textarea:focus {
    outline: 2px solid var(--teal-light);
    outline-offset: -1px;
  }
  
  .retro-btn {
    align-self: flex-start;
    background: var(--surface-2);
    color: var(--teal-light);
    border: 1px solid var(--teal-light);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .retro-btn:not(:disabled):hover {
    background: var(--teal-light-soft);
  }

  .retro-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  
  .retro-feedback {
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.45;
    margin-top: 4px;
  }
  
  .retro-feedback.is-correct {
    background: var(--correct-soft);
    border: 1px solid var(--correct);
    color: var(--correct);
  }
  
  .retro-feedback.is-incorrect {
    background: var(--incorrect-soft);
    border: 1px solid var(--incorrect);
    color: var(--incorrect);
  }

  @media (max-width: 480px) {
    .page { padding: 40px 16px 72px; }
    h1 { font-size: 24px; }
    .card { padding: 20px; }
    .flashcard { height: 340px; }
  }
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a href="index.html" class="brand">
      <svg viewBox="0 0 100 100" class="hex-icon" aria-hidden="true">
        <polygon class="f-light" points="50,50 50,5 88.97,27.5" />
        <polygon class="f-deep"  points="50,50 88.97,27.5 88.97,72.5" />
        <polygon class="f-light" points="50,50 88.97,72.5 50,95" />
        <polygon class="f-deep"  points="50,50 50,95 11.03,72.5" />
        <polygon class="f-light" points="50,50 11.03,72.5 11.03,27.5" />
        <polygon class="f-deep"  points="50,50 11.03,27.5 50,5" />
      </svg>
      Apex AI
    </a>
    <nav class="nav-links">
      <a href="index.html">← Home</a>
    </nav>
  </div>
</header>

<div class="page">

  <div class="intro">
    <p class="eyebrow">Apex AI</p>
    <h1>Upload your notes. Get quizzed.</h1>
    <p class="sub">Drop in a .txt file and Apex AI turns it into a quiz grounded in exactly what you wrote.</p>
  </div>

  <section class="card" id="send-card">
    <h2 class="card-title">Send</h2>

    <label for="file-input" class="dropzone" id="dropzone" tabindex="0">
      <input type="file" id="file-input" accept=".txt,text/plain" hidden />
      <span class="dropzone-text" id="dropzone-text">Drop a .txt file here, or click to choose one</span>
    </label>
    <div class="field">
      <label>Number of questions</label>
      <div class="pill-group" id="question-count-group" data-selected="10">
        <button type="button" class="pill" data-value="5">5</button>
        <button type="button" class="pill is-active" data-value="10">10</button>
        <button type="button" class="pill" data-value="15">15</button>
        <button type="button" class="pill" data-value="20">20</button>
      </div>
    </div>

    <div class="field">
      <label>Difficulty</label>
      <div class="pill-group" id="difficulty-group" data-selected="medium">
        <button type="button" class="pill" data-value="easy">Easy</button>
        <button type="button" class="pill is-active" data-value="medium">Medium</button>
        <button type="button" class="pill" data-value="hard">Hard</button>
      </div>
    </div>

    <div class="file-chip" id="file-chip" hidden>
      <span class="mono" id="file-name"></span>
      <button type="button" class="remove-btn" id="remove-file">Remove</button>
    </div>
    <button type="button" id="send-btn" class="send-btn" disabled>Send file</button>
  </section>

  <div class="connector" id="connector">
    <span class="connector-line"></span>
    <span class="connector-dot" id="connector-dot"></span>
    <span class="connector-label" id="connector-label">Idle</span>
    <span class="connector-line"></span>
  </div>

  <section class="card" id="response-card">
    <div class="response-header">
      <h2 class="card-title">Response</h2>
      <button type="button" class="retake-btn" id="retake-btn" hidden>Retake quiz</button>
    </div>
    <div class="response-meta" id="response-meta" hidden>
      <span class="status-pill" id="status-pill"></span>
      <span class="timestamp" id="timestamp"></span>
    </div>
    <div class="response-area is-box" id="response-area">
      <p class="response-text"><span class="placeholder">Nothing sent yet. The response will show up here.</span></p>
    </div>
  </section>

</div>

<script>
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('file-input');
  const dropzoneText = document.getElementById('dropzone-text');
  const fileChip = document.getElementById('file-chip');
  const fileNameEl = document.getElementById('file-name');
  const removeFileBtn = document.getElementById('remove-file');
  const sendBtn = document.getElementById('send-btn');
  const connector = document.getElementById('connector');
  const connectorLabel = document.getElementById('connector-label');
  const responseArea = document.getElementById('response-area');
  const retakeBtn = document.getElementById('retake-btn');
  const responseMeta = document.getElementById('response-meta');
  const statusPill = document.getElementById('status-pill');
  const timestampEl = document.getElementById('timestamp');

  let quizData = null;
  let answeredCount = 0;
  let scoreCount = 0;

  let fileContent = null;
  let fileName = null;
  let selectedFile = null;

  function updateSendState() {
    sendBtn.disabled = fileContent === null;
  }

  function setConnector(state, label) {
    connector.className = 'connector' + (state ? ' ' + state : '');
    connectorLabel.textContent = label;
  }

  function loadFile(file) {
    if (!file) return;
    const isTxt = file.name.toLowerCase().endsWith('.txt') || file.type === 'text/plain';
    if (!isTxt) {
      setConnector('error', 'Only .txt files are accepted');
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      fileContent = reader.result;
      fileName = file.name;
      selectedFile = file;
      fileNameEl.textContent = fileName;
      fileChip.hidden = false;
      dropzone.hidden = true;
      setConnector('', 'Idle');
      updateSendState();
    };
    reader.onerror = () => {
      setConnector('error', 'Could not read that file');
    };
    reader.readAsText(file);
  }

  // Click / keyboard to open file picker
  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      fileInput.click();
    }
  });

  fileInput.addEventListener('change', (e) => {
    loadFile(e.target.files[0]);
  });

  // Drag and drop
  ['dragenter', 'dragover'].forEach(evt => {
    dropzone.addEventListener(evt, (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });
  });
  ['dragleave', 'drop'].forEach(evt => {
    dropzone.addEventListener(evt, (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
    });
  });
  dropzone.addEventListener('drop', (e) => {
    const file = e.dataTransfer.files[0];
    loadFile(file);
  });

  removeFileBtn.addEventListener('click', () => {
    fileContent = null;
    fileName = null;
    selectedFile = null;
    fileInput.value = '';
    fileChip.hidden = true;
    dropzone.hidden = false;
    updateSendState();
  });

  function showLoading(text = 'Waiting for response…') {
    responseArea.classList.remove('is-box');
    responseArea.innerHTML = `
      <div class="loading-state">
        <span class="spinner" aria-hidden="true"></span>
        <span class="loading-text">${text}</span>
      </div>`;
    retakeBtn.hidden = true;
  }

  function showText(text, isError = false) {
    responseArea.classList.add('is-box');
    responseArea.innerHTML = '';
    const p = document.createElement('p');
    p.className = 'response-text' + (isError ? ' error-text' : '');
    p.textContent = text;
    responseArea.appendChild(p);
    retakeBtn.hidden = true;
  }

  function updateQuizSummary(total) {
    const el = document.getElementById('quiz-summary');
    if (!el) return;
    if (answeredCount === 0) {
      el.textContent = `${total} question${total === 1 ? '' : 's'}`;
      el.classList.remove('all-done');
    } else if (answeredCount < total) {
      el.textContent = `${answeredCount} of ${total} answered · ${scoreCount} correct so far`;
      el.classList.remove('all-done');
    } else {
      el.textContent = `Done — ${scoreCount} of ${total} correct`;
      el.classList.add('all-done');
    }
  }

  // ---- CSV & Flashcards logic ----
  
  // Basic CSV parser to handle quotes and commas inside text accurately
  function parseCSV(text) {
    const rows = [];
    let currentRow = [];
    let currentCell = '';
    let inQuotes = false;
    
    for (let i = 0; i < text.length; i++) {
      const char = text[i];
      if (inQuotes) {
        if (char === '"') {
          if (i + 1 < text.length && text[i+1] === '"') {
            currentCell += '"'; // escaped quote
            i++;
          } else {
            inQuotes = false;
          }
        } else {
          currentCell += char;
        }
      } else {
        if (char === '"') {
          inQuotes = true;
        } else if (char === ',') {
          currentRow.push(currentCell.trim());
          currentCell = '';
        } else if (char === '\n' || char === '\r') {
          currentRow.push(currentCell.trim());
          if (currentRow.length > 1 || currentRow[0] !== '') {
            rows.push(currentRow);
          }
          currentRow = [];
          currentCell = '';
          if (char === '\r' && i + 1 < text.length && text[i+1] === '\n') {
            i++; // skip standard \r\n newline
          }
        } else {
          currentCell += char;
        }
      }
    }
    // Push the last trailing cell/row
    if (currentCell || currentRow.length > 0) {
       currentRow.push(currentCell.trim());
       rows.push(currentRow);
    }
    
    // Map array to objects (assuming Column 1 = Front, Column 2 = Back)
    let startIndex = 0;
    if (rows.length > 0 && (rows[0][0].toLowerCase().includes('front') || rows[0][0].toLowerCase().includes('question'))) {
       startIndex = 1; // skip header
    }
    
    const result = [];
    for (let i = startIndex; i < rows.length; i++) {
       if (rows[i].length >= 2) {
          result.push({ front: rows[i][0], back: rows[i][1] });
       }
    }
    return result;
  }

  function renderFlashcards(cardsArray, originalBlob, reviewItems) {
    // Merge reviewItems metadata into cardsArray
    cardsArray.forEach((card, i) => {
      if (reviewItems[i]) {
        card.confidence = reviewItems[i].confidence;
        card.original_question = reviewItems[i].original_question;
        card.correct_answer = reviewItems[i].correct_answer;
        card.explanation = reviewItems[i].explanation;
      }
    });

    responseArea.classList.remove('is-box');
    responseArea.innerHTML = '';
    retakeBtn.hidden = false;

    let currentIndex = 0;

    const wrapper = document.createElement('div');
    wrapper.className = 'flashcard-wrapper';

    // Header info
    const header = document.createElement('div');
    header.className = 'flashcard-header';
    
    const title = document.createElement('span');
    title.textContent = 'Review Flashcards';
    
    const counter = document.createElement('span');
    counter.className = 'fc-counter';
    counter.textContent = `1 / ${cardsArray.length}`;
    
    header.appendChild(title);
    header.appendChild(counter);

    // Flashcard 3D element
    const cardEl = document.createElement('div');
    cardEl.className = 'flashcard';
    
    const cardInner = document.createElement('div');
    cardInner.className = 'flashcard-inner';
    
    const cardFront = document.createElement('div');
    cardFront.className = 'flashcard-front';
    const cardFrontText = document.createElement('span');
    cardFront.appendChild(cardFrontText);
    
    const frontHint = document.createElement('div');
    frontHint.className = 'flashcard-hint';
    frontHint.textContent = 'Click anywhere on card to flip';
    cardFront.appendChild(frontHint);

    const cardBack = document.createElement('div');
    cardBack.className = 'flashcard-back';
    
    const cardBackText = document.createElement('div');
    cardBack.appendChild(cardBackText);
    
    // Container for Retrospective Teaching Feature
    const retroContainer = document.createElement('div');
    retroContainer.className = 'retro-container';
    retroContainer.addEventListener('click', e => e.stopPropagation()); // prevent card flip
    cardBack.appendChild(retroContainer);

    cardInner.appendChild(cardFront);
    cardInner.appendChild(cardBack);
    cardEl.appendChild(cardInner);

    // Controls
    const controls = document.createElement('div');
    controls.className = 'flashcard-controls';

    const prevBtn = document.createElement('button');
    prevBtn.className = 'fc-btn';
    prevBtn.textContent = '← Prev';
    
    const nextBtn = document.createElement('button');
    nextBtn.className = 'fc-btn';
    nextBtn.textContent = 'Next →';

    controls.appendChild(prevBtn);
    controls.appendChild(nextBtn);

    // Optional download button
    const downloadBtn = document.createElement('button');
    downloadBtn.className = 'download-csv-btn';
    downloadBtn.textContent = 'Download original CSV';
    downloadBtn.onclick = () => {
      const url = window.URL.createObjectURL(originalBlob);
      const a = document.createElement('a');
      a.style.display = 'none';
      a.href = url;
      a.download = 'review_notes.csv';
      document.body.appendChild(a);
      a.click();
      window.URL.revokeObjectURL(url);
      document.body.removeChild(a);
    };

    wrapper.appendChild(header);
    wrapper.appendChild(cardEl);
    wrapper.appendChild(controls);
    wrapper.appendChild(downloadBtn);
    responseArea.appendChild(wrapper);

    // State updaters
    function updateCard() {
      cardEl.classList.remove('flipped');
      setTimeout(() => {
        // Reset scroll position to top when flipping/changing card
        cardFront.scrollTop = 0;
        cardBack.scrollTop = 0;

        cardFrontText.textContent = cardsArray[currentIndex].front;
        cardBackText.textContent = cardsArray[currentIndex].back;
        
        // Build Retrospective UI conditionally
        retroContainer.innerHTML = ''; // clear previous
        
        const cardData = cardsArray[currentIndex];
        if (cardData && cardData.confidence) {
          const isConfident = cardData.confidence === 'locked';
          
          const promptText = document.createElement('div');
          promptText.className = 'retro-prompt';
          
          const textarea = document.createElement('textarea');
          textarea.className = 'retro-textarea';
          
          if (isConfident) {
            promptText.textContent = "You were highly confident but missed this one! What was your original line of thinking? Explain your logic so we can find the misconception.";
            textarea.placeholder = "I thought it was X because...";
          } else {
            promptText.textContent = "You guessed or were unsure here. To lock this concept into your brain, summarize the correct explanation in your own words below.";
            textarea.placeholder = "Type your 1-sentence summary here...";
          }

          const btn = document.createElement('button');
          btn.className = 'retro-btn';
          btn.textContent = 'Verify Response';
          btn.disabled = true;

          textarea.addEventListener('input', () => {
            btn.disabled = textarea.value.trim() === '';
          });

          // Prevent clicking the textarea/button from flipping the flashcard
          textarea.addEventListener('click', e => e.stopPropagation());
          btn.addEventListener('click', e => e.stopPropagation());
          promptText.addEventListener('click', e => e.stopPropagation());

          const feedbackBox = document.createElement('div');
          feedbackBox.className = 'retro-feedback';
          feedbackBox.hidden = true;

          btn.addEventListener('click', async () => {
            const userText = textarea.value.trim();
            if (!userText) return;

            btn.disabled = true;
            btn.innerHTML = `<span class="spinner" style="width:14px;height:14px;border-width:2px;margin-right:2px;" aria-hidden="true"></span> Verifying...`;
            feedbackBox.hidden = true;

            const payload = {
              question: cardData.original_question,
              correct_answer: cardData.correct_answer,
              explanation: cardData.explanation,
              user_text: userText,
              was_confident: isConfident
            };

            try {
              const res = await fetch('https://n8ngc.codeblazar.org/webhook/c240-fa-webflow-verify-retrospective', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              
              if (!res.ok) throw new Error('API Error');
              
              const data = await res.json();
              
              feedbackBox.textContent = data.feedback || "Feedback received.";
              feedbackBox.className = 'retro-feedback ' + (data.is_correct ? 'is-correct' : 'is-incorrect');
              feedbackBox.hidden = false;
              
              btn.innerHTML = `Verified`;
              
            } catch (err) {
              console.error("Retrospective verification error:", err);
              feedbackBox.textContent = "Error reaching the verification endpoint. Check your network or URL.";
              feedbackBox.className = 'retro-feedback is-incorrect';
              feedbackBox.hidden = false;
              
              btn.disabled = false;
              btn.textContent = 'Try Again';
            }
          });

          retroContainer.appendChild(promptText);
          retroContainer.appendChild(textarea);
          retroContainer.appendChild(btn);
          retroContainer.appendChild(feedbackBox);
        }

        counter.textContent = `${currentIndex + 1} / ${cardsArray.length}`;
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === cardsArray.length - 1;
      }, 150); // small delay to hide text change during flip back
    }

    // Events
    cardEl.addEventListener('click', () => {
      cardEl.classList.toggle('flipped');
    });

    prevBtn.addEventListener('click', () => {
      if (currentIndex > 0) {
        currentIndex--;
        updateCard();
      }
    });

    nextBtn.addEventListener('click', () => {
      if (currentIndex < cardsArray.length - 1) {
        currentIndex++;
        updateCard();
      }
    });

    // Initialize first card
    updateCard();
  }

  // Parses user's inputs to build the array of items for review
  async function generateReviewList() {
    const reviewItems = [];
    if (!quizData) return reviewItems;

    quizData.forEach((q, i) => {
      const selectedRadio = document.querySelector(`input[name="conf-q${i}"]:checked`);
      if (selectedRadio) {
        const val = selectedRadio.value;
        
        // Include if they were guessing/unsure OR if they were confident but answered incorrectly
        const isUnsureOrGuessing = (val === 'guessing' || val === 'unsure');
        const isConfidentButWrong = (val === 'locked' && q.user_correct === false);

        if (isUnsureOrGuessing || isConfidentButWrong) {
          
          // Append the choices to the question so they appear in the CSV and Flashcards
          let formattedQuestion = q.question;
          if (q.options && Array.isArray(q.options) && q.options.length > 0) {
            formattedQuestion += "\n\nChoices:\n• " + q.options.join("\n• ");
          }

          reviewItems.push({
            original_question: q.question, // raw text needed for Retro Teaching payload
            question: formattedQuestion,
            correct_answer: q.correct_answer,
            explanation: q.explanation || "", // needed for Retro Teaching payload
            confidence: val
          });
        }
      }
    });
    
    if (reviewItems.length === 0) {
      alert("No questions selected for review (Requires 'Guessing', 'Unsure', or an incorrect 'Locked In' answer).");
      return;
    }

    const payload = { quizAnswers: reviewItems };
    
    // Switch to loading UI in the response area
    showLoading('Generating flashcards...');

    try {
      const response = await fetch('https://n8ngc.codeblazar.org/webhook/c240-fa-webflow-review-submission', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        throw new Error(`Server responded with status: ${response.status}`);
      }

      const blob = await response.blob();
      const csvText = await blob.text();
      
      const flashcards = parseCSV(csvText);
      
      if (flashcards.length > 0) {
        renderFlashcards(flashcards, blob, reviewItems);
        setConnector('success', 'Flashcards Ready');
      } else {
        showText('No valid flashcard data returned in the CSV file.', true);
        setConnector('error', 'Empty response');
      }
    } catch (error) {
      console.error("Error generating review file:", error);
      showText("Failed to generate flashcards. The service might be down or unavailable. Please try again later.", true);
      setConnector('error', 'Review failed');
    }
  }

  function showQuiz(questions) {
    quizData = questions;
    answeredCount = 0;
    scoreCount = 0;

    responseArea.classList.remove('is-box');
    responseArea.innerHTML = '';

    const summary = document.createElement('div');
    summary.className = 'quiz-summary';
    summary.id = 'quiz-summary';
    responseArea.appendChild(summary);

    const submitBtn = document.createElement('button');
    submitBtn.type = 'button';
    submitBtn.className = 'submit-quiz-btn';
    submitBtn.textContent = 'Submit For Review';
    submitBtn.disabled = true; 
    submitBtn.addEventListener('click', generateReviewList);

    questions.forEach((q, i) => {
      // Initialize internal correctness tracking
      q.user_correct = undefined; 

      const block = document.createElement('div');
      block.className = 'quiz-question';

      const qText = document.createElement('p');
      qText.className = 'quiz-q-text';
      const qNum = document.createElement('span');
      qNum.className = 'quiz-q-num';
      qNum.textContent = `Q${i + 1}`;
      qText.appendChild(qNum);
      qText.appendChild(document.createTextNode(q.question));
      block.appendChild(qText);

      const options = document.createElement('div');
      options.className = 'quiz-options';

      const explanation = document.createElement('p');
      explanation.className = 'quiz-explanation';
      explanation.textContent = q.explanation || '';
      explanation.hidden = true;

      (q.options || []).forEach(opt => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'quiz-option';
        btn.textContent = opt;
        btn.addEventListener('click', () => {
          const correct = opt === q.correct_answer;
          q.user_correct = correct; // Record correctness on the object

          Array.from(options.children).forEach(b => { b.disabled = true; });
          btn.classList.add(correct ? 'is-correct' : 'is-incorrect');
          if (!correct) {
            const correctBtn = Array.from(options.children).find(b => b.textContent === q.correct_answer);
            if (correctBtn) correctBtn.classList.add('is-correct');
          }
          explanation.hidden = false;
          answeredCount++;
          if (correct) scoreCount++;
          updateQuizSummary(questions.length);
        });
        options.appendChild(btn);
      });

      const confidenceGroup = document.createElement('div');
      confidenceGroup.className = 'confidence-group';
      
      const confTitle = document.createElement('span');
      confTitle.className = 'confidence-title';
      confTitle.textContent = 'Confidence:';
      confidenceGroup.appendChild(confTitle);

      const confOptions = [
        { value: 'guessing', emoji: '🎲', text: 'Guessing' },
        { value: 'unsure', emoji: '🤔', text: 'Unsure' },
        { value: 'locked', emoji: '🔒', text: 'Locked In' }
      ];

      confOptions.forEach(opt => {
        const label = document.createElement('label');
        label.className = 'confidence-label';
        
        const input = document.createElement('input');
        input.type = 'radio';
        input.name = `conf-q${i}`;
        input.value = opt.value;
        
        input.addEventListener('change', () => {
          const totalSelected = responseArea.querySelectorAll('input[type="radio"]:checked').length;
          if (totalSelected === questions.length) {
            submitBtn.disabled = false;
          }
        });

        const pill = document.createElement('span');
        pill.className = 'confidence-pill';
        pill.textContent = `${opt.emoji} ${opt.text}`;
        
        label.appendChild(input);
        label.appendChild(pill);
        confidenceGroup.appendChild(label);
      });

      block.appendChild(options);
      block.appendChild(confidenceGroup);
      block.appendChild(explanation);
      responseArea.appendChild(block);
    });

    responseArea.appendChild(submitBtn);

    updateQuizSummary(questions.length);
    retakeBtn.hidden = false;
  }

  retakeBtn.addEventListener('click', () => {
    if (quizData) showQuiz(quizData);
  });

  sendBtn.addEventListener('click', async () => {
    if (fileContent === null) return;
    
    const url = "https://n8ngc.codeblazar.org/webhook/c240-fa-webflow-quiz-gen"

    sendBtn.disabled = true;
    setConnector('sending', 'Sending…');
    responseMeta.hidden = true;
    retakeBtn.hidden = true;
    showLoading();

    try {
      const ext = (fileName.split('.').pop() || 'unknown').toLowerCase();
      const formData = new FormData();
      formData.append('file', selectedFile, fileName);
      formData.append('contentKind', `file/${ext}`);
      formData.append('questionCount', window.selectedQuestionCount);
      formData.append('difficulty', window.selectedDifficulty);

      const res = await fetch(url, {
        method: 'POST',
        body: formData
      });

      const raw = await res.text();
      const ok = res.ok;

      responseMeta.hidden = false;
      responseMeta.className = 'response-meta ' + (ok ? 'success' : 'error');
      statusPill.textContent = res.status + ' ' + res.statusText;
      timestampEl.textContent = new Date().toLocaleTimeString();

      let parsed = null;
      try { parsed = JSON.parse(raw); } catch (_) { /* not JSON */ }

      const questions = parsed && Array.isArray(parsed.questions) ? parsed.questions : null;

      if (ok && questions && questions.length) {
        showQuiz(questions);
        setConnector('success', 'Received');
      } else {
        let errorMsg = "The service is currently unavailable or returned an invalid response. Please try again later.";
        
        if (parsed && parsed.message) {
          errorMsg = parsed.message;
        } else if (raw && raw.length > 0 && !raw.trim().startsWith('<')) {
          // If the error response is plain text (not a big HTML failure page), show it
          errorMsg = raw.length < 300 ? raw : errorMsg;
        }

        showText(errorMsg, true);
        setConnector('error', 'Endpoint returned an error');
      }
    } catch (err) {
      responseMeta.hidden = false;
      responseMeta.className = 'response-meta error';
      statusPill.textContent = 'Network error';
      timestampEl.textContent = new Date().toLocaleTimeString();
      showText("Couldn't reach the server. The service might be down or unavailable. Please check your connection and try again.", true);
      setConnector('error', 'Failed to send');
    } finally {
      updateSendState();
    }
  });
</script>

<script>
  window.selectedQuestionCount = '10';
  window.selectedDifficulty = 'medium';

  function setupPillGroup(groupId, onChange) {
    const group = document.getElementById(groupId);
    const pills = group.querySelectorAll('.pill');
    pills.forEach(pill => {
      pill.addEventListener('click', () => {
        pills.forEach(p => p.classList.remove('is-active'));
        pill.classList.add('is-active');
        group.dataset.selected = pill.dataset.value;
        onChange(pill.dataset.value);
      });
    });
  }

  setupPillGroup('question-count-group', (val) => { window.selectedQuestionCount = val; });
  setupPillGroup('difficulty-group', (val) => { window.selectedDifficulty = val; });
</script>

</body>
</html>
