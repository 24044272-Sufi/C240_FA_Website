<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apex AI — Try it</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F1A1B;
    --surface: #17262A;
    --surface-2: #1E2F33;
    --ink: #E8EDEC;
    --ink-soft: #8FA3A3;
    --teal-deep: #3C9C93;
    --teal-light: #8FD9CC;
    --teal-light-soft: rgba(143, 217, 204, 0.12);
    --correct: #7ED957;
    --correct-soft: rgba(126, 217, 87, 0.12);
    --incorrect: #E2665A;
    --incorrect-soft: rgba(226, 102, 90, 0.12);
    --line: rgba(143, 217, 204, 0.14);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .mono {
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
  }

  a:focus-visible,
  button:focus-visible,
  input:focus-visible,
  label:focus-visible {
    outline: 2px solid var(--teal-light);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* ---------- Hex mark (shared with home page) ---------- */
  .hex-icon { display: block; }
  .hex-icon polygon { stroke: var(--bg); stroke-width: 1.6; stroke-linejoin: round; }
  .hex-icon .f-light { fill: var(--teal-light); }
  .hex-icon .f-deep { fill: var(--teal-deep); }

  /* ---------- Nav ---------- */
  .nav {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(15, 26, 27, 0.82);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }

  .nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 18px;
    text-decoration: none;
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  .brand .hex-icon { width: 26px; height: 26px; }

  .nav-links a {
    text-decoration: none;
    font-size: 14.5px;
    color: var(--ink-soft);
    transition: color 0.15s ease;
  }
  .nav-links a:hover { color: var(--ink); }

  /* ---------- Page ---------- */
  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 56px 24px 96px;
  }

  .intro {
    margin-bottom: 40px;
  }

  .eyebrow {
    margin: 0 0 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--teal-light);
  }

  h1 {
    margin: 0 0 12px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 30px;
    line-height: 1.2;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .sub {
    margin: 0;
    font-size: 15px;
    line-height: 1.55;
    color: var(--ink-soft);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 28px;
  }

  .card-title {
    margin: 0 0 20px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  /* Dropzone */
  .dropzone {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    border: 1.5px dashed var(--line);
    border-radius: 10px;
    padding: 28px 16px;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .dropzone:hover,
  .dropzone.dragover {
    border-color: var(--teal-light);
    background: var(--teal-light-soft);
  }

  .dropzone-text {
    font-size: 14px;
    color: var(--ink-soft);
  }

  .dropzone.dragover .dropzone-text {
    color: var(--teal-light);
  }

  .file-chip {
    margin-top: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 14px;
    background: var(--teal-light-soft);
    border-radius: 8px;
    font-size: 13px;
  }

  .file-chip .mono {
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .remove-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    color: var(--teal-light);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
  }

  .field {
    margin-top: 20px;
  }

  .field label {
    display: block;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    padding: 11px 13px;
    font-size: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--bg);
    color: var(--ink);
  }

  .field input::placeholder {
    color: #55696A;
  }

  .pill-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pill {
    padding: 8px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--surface-2);
    color: var(--ink-soft);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
  }

  .pill:hover {
    border-color: var(--teal-light);
    color: var(--ink);
  }

  .pill.is-active {
    border-color: var(--teal-light);
    background: var(--teal-light-soft);
    color: var(--teal-light);
    font-weight: 500;
  }

  .mode-hint {
    margin: 8px 2px 0;
    font-size: 12.5px;
    color: var(--ink-soft);
  }

  .mode-hint code {
    background: var(--teal-light-soft);
    color: var(--teal-light);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12px;
  }

  .send-btn {
    width: 100%;
    margin-top: 22px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    color: #0B1414;
    background: var(--teal-light);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }

  .send-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .send-btn:not(:disabled):hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  /* Connector */
  .connector {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 0;
  }

  .connector-line {
    width: 1px;
    height: 20px;
    background: var(--line);
  }

  .connector-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--ink-soft);
    margin: 8px 0;
    flex-shrink: 0;
  }

  .connector-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.03em;
    color: var(--ink-soft);
    margin: 0 0 8px;
  }

  .connector.sending .connector-dot {
    background: var(--teal-light);
    animation: pulse 1.1s ease-in-out infinite;
  }
  .connector.sending .connector-line { background: var(--teal-light-soft); }
  .connector.sending .connector-label { color: var(--teal-light); }

  .connector.success .connector-dot { background: var(--correct); }
  .connector.success .connector-label { color: var(--correct); }

  .connector.error .connector-dot { background: var(--incorrect); }
  .connector.error .connector-label { color: var(--incorrect); }

  @media (prefers-reduced-motion: no-preference) {
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.6); opacity: 0.5; }
    }
  }

  /* Response */
  .response-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-bottom: 14px;
  }

  .response-meta .status-pill {
    padding: 3px 8px;
    border-radius: 5px;
    font-weight: 500;
  }

  .response-meta.success .status-pill {
    background: var(--correct-soft);
    color: var(--correct);
  }

  .response-meta.error .status-pill {
    background: var(--incorrect-soft);
    color: var(--incorrect);
  }

  .response-meta .timestamp {
    color: var(--ink-soft);
  }

  .response-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .response-header .card-title {
    margin-bottom: 0;
  }

  .retake-btn {
    background: none;
    border: none;
    color: var(--teal-light);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
  }

  .response-area {
    min-height: 96px;
  }

  .response-area.is-box {
    padding: 16px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    max-height: 420px;
    overflow: auto;
  }

  .response-text {
    margin: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .response-text .placeholder {
    color: #5C7071;
    font-family: 'Inter', sans-serif;
  }

  /* Loading spinner */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 32px 0;
  }

  .spinner {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 3px solid var(--line);
    border-top-color: var(--teal-light);
    flex-shrink: 0;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--ink-soft);
  }

  /* Quiz */
  .quiz-summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }

  .quiz-summary.all-done {
    color: var(--correct);
  }

  .quiz-question {
    margin-bottom: 22px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--line);
  }

  .quiz-question:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }

  .quiz-q-num {
    color: var(--teal-light);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    margin-right: 8px;
  }

  .quiz-q-text {
    margin: 0 0 12px;
    font-size: 14.5px;
    font-weight: 500;
    line-height: 1.5;
  }

  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .quiz-option {
    position: relative;
    text-align: left;
    padding: 10px 40px 10px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface-2);
    font-size: 13.5px;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .quiz-option:hover:not(:disabled) {
    border-color: var(--teal-light);
    background: var(--teal-light-soft);
  }

  .quiz-option:disabled {
    cursor: default;
  }

  .quiz-option.is-correct {
    border-color: var(--correct);
    background: var(--correct-soft);
    color: var(--correct);
    font-weight: 500;
  }

  .quiz-option.is-incorrect {
    border-color: var(--incorrect);
    background: var(--incorrect-soft);
    color: var(--incorrect);
    font-weight: 500;
  }

  .quiz-option.is-correct::after,
  .quiz-option.is-incorrect::after {
    content: '';
    position: absolute;
    top: 50%;
    right: 12px;
    width: 18px;
    height: 18px;
    transform: translateY(-50%);
    clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
  }
  .quiz-option.is-correct::after { background: var(--correct); }
  .quiz-option.is-incorrect::after { background: var(--incorrect); }

  /* Confidence Radio Group */
  .confidence-group {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }

  .confidence-title {
    font-size: 12px;
    color: var(--ink-soft);
    margin-right: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  .confidence-label {
    cursor: pointer;
    position: relative;
  }

  .confidence-label input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
  }

  .confidence-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--surface-2);
    color: var(--ink-soft);
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
  }

  .confidence-label:hover .confidence-pill {
    border-color: var(--teal-light);
    color: var(--ink);
  }

  .confidence-label input:checked + .confidence-pill {
    border-color: var(--teal-light);
    background: var(--teal-light-soft);
    color: var(--teal-light);
    font-weight: 500;
  }

  .confidence-label input:focus-visible + .confidence-pill {
    outline: 2px solid var(--teal-light);
    outline-offset: 2px;
  }

  .quiz-explanation {
    margin: 14px 0 0;
    padding: 10px 12px;
    background: var(--bg);
    border-left: 3px solid var(--teal-light);
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--ink-soft);
  }

  .submit-quiz-btn {
    width: 100%;
    margin-top: 12px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    color: #0B1414;
    background: var(--teal-light);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }

  .submit-quiz-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .submit-quiz-btn:not(:disabled):hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  #response-card {
    margin-top: 4px;
  }

  @media (max-width: 480px) {
    .page { padding: 40px 16px 72px; }
    h1 { font-size: 24px; }
    .card { padding: 20px; }
  }
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a href="index.html" class="brand">
      <svg viewBox="0 0 100 100" class="hex-icon" aria-hidden="true">
        <polygon class="f-light" points="50,50 50,5 88.97,27.5" />
        <polygon class="f-deep"  points="50,50 88.97,27.5 88.97,72.5" />
        <polygon class="f-light" points="50,50 88.97,72.5 50,95" />
        <polygon class="f-deep"  points="50,50 50,95 11.03,72.5" />
        <polygon class="f-light" points="50,50 11.03,72.5 11.03,27.5" />
        <polygon class="f-deep"  points="50,50 11.03,27.5 50,5" />
      </svg>
      Apex AI
    </a>
    <nav class="nav-links">
      <a href="index.html">← Home</a>
    </nav>
  </div>
</header>

<div class="page">

  <div class="intro">
    <p class="eyebrow">Apex AI</p>
    <h1>Upload your notes. Get quizzed.</h1>
    <p class="sub">Drop in a .txt file and Apex AI turns it into a quiz grounded in exactly what you wrote.</p>
  </div>

  <section class="card" id="send-card">
    <h2 class="card-title">Send</h2>

    <label for="file-input" class="dropzone" id="dropzone" tabindex="0">
      <input type="file" id="file-input" accept=".txt,text/plain" hidden />
      <span class="dropzone-text" id="dropzone-text">Drop a .txt file here, or click to choose one</span>
    </label>
    <div class="field">
      <label>Number of questions</label>
      <div class="pill-group" id="question-count-group" data-selected="10">
        <button type="button" class="pill" data-value="5">5</button>
        <button type="button" class="pill is-active" data-value="10">10</button>
        <button type="button" class="pill" data-value="15">15</button>
        <button type="button" class="pill" data-value="20">20</button>
      </div>
    </div>

    <div class="field">
      <label>Difficulty</label>
      <div class="pill-group" id="difficulty-group" data-selected="medium">
        <button type="button" class="pill" data-value="easy">Easy</button>
        <button type="button" class="pill is-active" data-value="medium">Medium</button>
        <button type="button" class="pill" data-value="hard">Hard</button>
      </div>
    </div>

    <div class="file-chip" id="file-chip" hidden>
      <span class="mono" id="file-name"></span>
      <button type="button" class="remove-btn" id="remove-file">Remove</button>
    </div>
    <button type="button" id="send-btn" class="send-btn" disabled>Send file</button>
  </section>

  <div class="connector" id="connector">
    <span class="connector-line"></span>
    <span class="connector-dot" id="connector-dot"></span>
    <span class="connector-label" id="connector-label">Idle</span>
    <span class="connector-line"></span>
  </div>

  <section class="card" id="response-card">
    <div class="response-header">
      <h2 class="card-title">Response</h2>
      <button type="button" class="retake-btn" id="retake-btn" hidden>Retake quiz</button>
    </div>
    <div class="response-meta" id="response-meta" hidden>
      <span class="status-pill" id="status-pill"></span>
      <span class="timestamp" id="timestamp"></span>
    </div>
    <div class="response-area is-box" id="response-area">
      <p class="response-text"><span class="placeholder">Nothing sent yet. The response will show up here.</span></p>
    </div>
  </section>

</div>

<script>
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('file-input');
  const dropzoneText = document.getElementById('dropzone-text');
  const fileChip = document.getElementById('file-chip');
  const fileNameEl = document.getElementById('file-name');
  const removeFileBtn = document.getElementById('remove-file');
  const sendBtn = document.getElementById('send-btn');
  const connector = document.getElementById('connector');
  const connectorLabel = document.getElementById('connector-label');
  const responseArea = document.getElementById('response-area');
  const retakeBtn = document.getElementById('retake-btn');
  const responseMeta = document.getElementById('response-meta');
  const statusPill = document.getElementById('status-pill');
  const timestampEl = document.getElementById('timestamp');

  let quizData = null;
  let answeredCount = 0;
  let scoreCount = 0;

  let fileContent = null;
  let fileName = null;
  let selectedFile = null;
  // const modeHint = document.getElementById('mode-hint');

  // function updateModeHint() {
  //   const ext = fileName ? fileName.split('.').pop().toLowerCase() : 'txt';
  //   modeHint.innerHTML = `Sent as <code class="mono">multipart/form-data</code> with header <code class="mono">X-Content-Kind: file/${ext}</code>.`;
  // }

  function updateSendState() {
    sendBtn.disabled = fileContent === null;
  }

  function setConnector(state, label) {
    connector.className = 'connector' + (state ? ' ' + state : '');
    connectorLabel.textContent = label;
  }

  function loadFile(file) {
    if (!file) return;
    const isTxt = file.name.toLowerCase().endsWith('.txt') || file.type === 'text/plain';
    if (!isTxt) {
      setConnector('error', 'Only .txt files are accepted');
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      fileContent = reader.result;
      fileName = file.name;
      selectedFile = file;
      fileNameEl.textContent = fileName;
      fileChip.hidden = false;
      dropzone.hidden = true;
      setConnector('', 'Idle');
      // updateModeHint();
      updateSendState();
    };
    reader.onerror = () => {
      setConnector('error', 'Could not read that file');
    };
    reader.readAsText(file);
  }

  // Click / keyboard to open file picker
  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      fileInput.click();
    }
  });

  fileInput.addEventListener('change', (e) => {
    loadFile(e.target.files[0]);
  });

  // Drag and drop
  ['dragenter', 'dragover'].forEach(evt => {
    dropzone.addEventListener(evt, (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });
  });
  ['dragleave', 'drop'].forEach(evt => {
    dropzone.addEventListener(evt, (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
    });
  });
  dropzone.addEventListener('drop', (e) => {
    const file = e.dataTransfer.files[0];
    loadFile(file);
  });

  removeFileBtn.addEventListener('click', () => {
    fileContent = null;
    fileName = null;
    selectedFile = null;
    fileInput.value = '';
    fileChip.hidden = true;
    dropzone.hidden = false;
    updateSendState();
  });

  function showLoading() {
    responseArea.classList.remove('is-box');
    responseArea.innerHTML = `
      <div class="loading-state">
        <span class="spinner" aria-hidden="true"></span>
        <span class="loading-text">Waiting for response…</span>
      </div>`;
    retakeBtn.hidden = true;
  }

  function showText(text) {
    responseArea.classList.add('is-box');
    responseArea.innerHTML = '';
    const p = document.createElement('p');
    p.className = 'response-text';
    p.textContent = text;
    responseArea.appendChild(p);
    retakeBtn.hidden = true;
  }

  function updateQuizSummary(total) {
    const el = document.getElementById('quiz-summary');
    if (!el) return;
    if (answeredCount === 0) {
      el.textContent = `${total} question${total === 1 ? '' : 's'}`;
      el.classList.remove('all-done');
    } else if (answeredCount < total) {
      el.textContent = `${answeredCount} of ${total} answered · ${scoreCount} correct so far`;
      el.classList.remove('all-done');
    } else {
      el.textContent = `Done — ${scoreCount} of ${total} correct`;
      el.classList.add('all-done');
    }
  }

 // Parses user's inputs to build the array of items for review
  async function generateReviewList() {
    const reviewItems = [];
    if (!quizData) return reviewItems;

    quizData.forEach((q, i) => {
      // Find what the user selected for this question
      const selectedRadio = document.querySelector(`input[name="conf-q${i}"]:checked`);
      if (selectedRadio) {
        const val = selectedRadio.value;
        // Only include "guessing" and "unsure"
        if (val === 'guessing' || val === 'unsure') {
          reviewItems.push({
            question: q.question,
            correct_answer: q.correct_answer,
            confidence: val
          });
        }
      }
    });
    
    const payload = {
      quizAnswers: reviewItems,
    };

    console.log("Items to review:", reviewItems);

    try {
      // 1. Await the fetch response
      const response = await fetch('https://n8ngc.codeblazar.org/webhook/c240-fa-webflow-review-submission', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        throw new Error(`Server responded with status: ${response.status}`);
      }

      // 2. Parse the response as a Binary Large Object (Blob)
      const blob = await response.blob();

      // 3. Create a local URL for the blob
      const downloadUrl = window.URL.createObjectURL(blob);

      // 4. Create a temporary anchor element to trigger the download
      const a = document.createElement('a');
      a.style.display = 'none';
      a.href = downloadUrl;
      a.download = 'review_notes.csv'; // You can change this default filename

      // 5. Append to the DOM, click it, and clean up
      document.body.appendChild(a);
      a.click();
      window.URL.revokeObjectURL(downloadUrl);
      document.body.removeChild(a);

    } catch (error) {
      console.error("Error generating review file:", error);
      alert("Failed to download the review file. Please check the console for details.");
    }

    return reviewItems;
  }

  function showQuiz(questions) {
    quizData = questions;
    answeredCount = 0;
    scoreCount = 0;

    responseArea.classList.remove('is-box');
    responseArea.innerHTML = '';

    const summary = document.createElement('div');
    summary.className = 'quiz-summary';
    summary.id = 'quiz-summary';
    responseArea.appendChild(summary);

    // Create Submit for Review button (disabled initially)
    const submitBtn = document.createElement('button');
    submitBtn.type = 'button';
    submitBtn.className = 'submit-quiz-btn';
    submitBtn.textContent = 'Submit For Review';
    submitBtn.disabled = true; // Button disabled out of the gate
    submitBtn.addEventListener('click', generateReviewList);

    questions.forEach((q, i) => {
      const block = document.createElement('div');
      block.className = 'quiz-question';

      const qText = document.createElement('p');
      qText.className = 'quiz-q-text';
      const qNum = document.createElement('span');
      qNum.className = 'quiz-q-num';
      qNum.textContent = `Q${i + 1}`;
      qText.appendChild(qNum);
      qText.appendChild(document.createTextNode(q.question));
      block.appendChild(qText);

      const options = document.createElement('div');
      options.className = 'quiz-options';

      const explanation = document.createElement('p');
      explanation.className = 'quiz-explanation';
      explanation.textContent = q.explanation || '';
      explanation.hidden = true;

      (q.options || []).forEach(opt => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'quiz-option';
        btn.textContent = opt;
        btn.addEventListener('click', () => {
          const correct = opt === q.correct_answer;
          Array.from(options.children).forEach(b => { b.disabled = true; });
          btn.classList.add(correct ? 'is-correct' : 'is-incorrect');
          if (!correct) {
            const correctBtn = Array.from(options.children).find(b => b.textContent === q.correct_answer);
            if (correctBtn) correctBtn.classList.add('is-correct');
          }
          explanation.hidden = false;
          answeredCount++;
          if (correct) scoreCount++;
          updateQuizSummary(questions.length);
        });
        options.appendChild(btn);
      });

      // UI Only: Confidence Rating
      const confidenceGroup = document.createElement('div');
      confidenceGroup.className = 'confidence-group';
      
      const confTitle = document.createElement('span');
      confTitle.className = 'confidence-title';
      confTitle.textContent = 'Confidence:';
      confidenceGroup.appendChild(confTitle);

      const confOptions = [
        { value: 'guessing', emoji: '🎲', text: 'Guessing' },
        { value: 'unsure', emoji: '🤔', text: 'Unsure' },
        { value: 'locked', emoji: '🔒', text: 'Locked In' }
      ];

      confOptions.forEach(opt => {
        const label = document.createElement('label');
        label.className = 'confidence-label';
        
        const input = document.createElement('input');
        input.type = 'radio';
        input.name = `conf-q${i}`;
        input.value = opt.value;
        
        // Listen for choices to unlock the submit button
        input.addEventListener('change', () => {
          // Check how many questions have a selected confidence rating
          const totalSelected = responseArea.querySelectorAll('input[type="radio"]:checked').length;
          // Enable button if all questions have a confidence selection
          if (totalSelected === questions.length) {
            submitBtn.disabled = false;
          }
        });

        const pill = document.createElement('span');
        pill.className = 'confidence-pill';
        pill.textContent = `${opt.emoji} ${opt.text}`;
        
        label.appendChild(input);
        label.appendChild(pill);
        confidenceGroup.appendChild(label);
      });

      block.appendChild(options);
      block.appendChild(confidenceGroup);
      block.appendChild(explanation);
      responseArea.appendChild(block);
    });

    // Append the submit button at the very end
    responseArea.appendChild(submitBtn);

    updateQuizSummary(questions.length);
    retakeBtn.hidden = false;
  }

  retakeBtn.addEventListener('click', () => {
    if (quizData) showQuiz(quizData);
  });

  sendBtn.addEventListener('click', async () => {
    if (fileContent === null) return;
    
    // const url = document.getElementById('webhook-url').value; 
    // if (!url) {
    //   alert("Please enter a Webhook URL first.");
    //   return;
    // }

    const url = "https://n8ngc.codeblazar.org/webhook/c240-fa-webflow-quiz-gen"

    sendBtn.disabled = true;
    setConnector('sending', 'Sending…');
    responseMeta.hidden = true;
    retakeBtn.hidden = true;
    showLoading();

    try {
      const ext = (fileName.split('.').pop() || 'unknown').toLowerCase();
      const formData = new FormData();
      formData.append('file', selectedFile, fileName);
      formData.append('contentKind', `file/${ext}`);
      formData.append('questionCount', window.selectedQuestionCount);
      formData.append('difficulty', window.selectedDifficulty);

      const res = await fetch(url, {
        method: 'POST',
        body: formData
      });

      const raw = await res.text();
      const ok = res.ok;

      responseMeta.hidden = false;
      responseMeta.className = 'response-meta ' + (ok ? 'success' : 'error');
      statusPill.textContent = res.status + ' ' + res.statusText;
      timestampEl.textContent = new Date().toLocaleTimeString();

      let parsed = null;
      try { parsed = JSON.parse(raw); } catch (_) { /* not JSON */ }

      const questions = parsed && Array.isArray(parsed.questions) ? parsed.questions : null;

      if (ok && questions && questions.length) {
        showQuiz(questions);
        setConnector('success', 'Received');
      } else {
        const display = parsed !== null ? JSON.stringify(parsed, null, 2) : raw;
        showText(display.length ? display : '(empty response body)');
        setConnector(ok ? 'success' : 'error', ok ? 'Received' : 'Endpoint returned an error');
      }
    } catch (err) {
      responseMeta.hidden = false;
      responseMeta.className = 'response-meta error';
      statusPill.textContent = 'Network error';
      timestampEl.textContent = new Date().toLocaleTimeString();
      showText("Couldn't reach that endpoint. Check the URL and the endpoint's CORS settings.");
      setConnector('error', 'Failed to send');
    } finally {
      updateSendState();
    }
  });
</script>

<script>
  window.selectedQuestionCount = '10';
  window.selectedDifficulty = 'medium';

  function setupPillGroup(groupId, onChange) {
    const group = document.getElementById(groupId);
    const pills = group.querySelectorAll('.pill');
    pills.forEach(pill => {
      pill.addEventListener('click', () => {
        pills.forEach(p => p.classList.remove('is-active'));
        pill.classList.add('is-active');
        group.dataset.selected = pill.dataset.value;
        onChange(pill.dataset.value);
      });
    });
  }

  setupPillGroup('question-count-group', (val) => { window.selectedQuestionCount = val; });
  setupPillGroup('difficulty-group', (val) => { window.selectedDifficulty = val; });
</script>
