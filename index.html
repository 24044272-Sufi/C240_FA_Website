<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Webhook Relay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F1F3F1;
    --paper: #FFFFFF;
    --ink: #1B1D1F;
    --ink-soft: #6E7175;
    --line: #DEE2DE;
    --signal: #3452E1;
    --signal-soft: #EAEDFC;
    --success: #1E8E5A;
    --success-soft: #E7F4EC;
    --error: #C9432E;
    --error-soft: #FBEAE7;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .mono {
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
  }

  .page {
    max-width: 560px;
    margin: 0 auto;
    padding: 64px 24px 96px;
  }

  .intro {
    margin-bottom: 40px;
  }

  .eyebrow {
    margin: 0 0 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--signal);
  }

  h1 {
    margin: 0 0 12px;
    font-size: 28px;
    line-height: 1.25;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .sub {
    margin: 0;
    font-size: 15px;
    line-height: 1.5;
    color: var(--ink-soft);
  }

  .card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 28px;
  }

  .card-title {
    margin: 0 0 20px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  /* Dropzone */
  .dropzone {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    border: 1.5px dashed var(--line);
    border-radius: 10px;
    padding: 28px 16px;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .dropzone:hover,
  .dropzone.dragover {
    border-color: var(--signal);
    background: var(--signal-soft);
  }

  .dropzone-text {
    font-size: 14px;
    color: var(--ink-soft);
  }

  .dropzone.dragover .dropzone-text {
    color: var(--signal);
  }

  .file-chip {
    margin-top: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 14px;
    background: var(--signal-soft);
    border-radius: 8px;
    font-size: 13px;
  }

  .file-chip .mono {
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .remove-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    color: var(--signal);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
  }

  .field {
    margin-top: 20px;
  }

  .field label {
    display: block;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    padding: 11px 13px;
    font-size: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--bg);
    color: var(--ink);
  }

  .field input::placeholder {
    color: #A3A6A3;
  }

  .mode-hint {
    margin: 8px 2px 0;
    font-size: 12.5px;
    color: var(--ink-soft);
  }

  .mode-hint code {
    background: var(--signal-soft);
    color: var(--signal);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12px;
  }

  .send-btn {
    width: 100%;
    margin-top: 22px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    color: #fff;
    background: var(--signal);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }

  .send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .send-btn:not(:disabled):hover {
    opacity: 0.88;
  }

  /* Connector: the signature element. Encodes live pipeline state. */
  .connector {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 0;
  }

  .connector-line {
    width: 1px;
    height: 20px;
    background: var(--line);
  }

  .connector-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--ink-soft);
    margin: 8px 0;
    flex-shrink: 0;
  }

  .connector-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.03em;
    color: var(--ink-soft);
    margin: 0 0 8px;
  }

  .connector.sending .connector-dot {
    background: var(--signal);
    animation: pulse 1.1s ease-in-out infinite;
  }
  .connector.sending .connector-line { background: var(--signal-soft); }
  .connector.sending .connector-label { color: var(--signal); }

  .connector.success .connector-dot { background: var(--success); }
  .connector.success .connector-label { color: var(--success); }

  .connector.error .connector-dot { background: var(--error); }
  .connector.error .connector-label { color: var(--error); }

  @media (prefers-reduced-motion: no-preference) {
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.6); opacity: 0.5; }
    }
  }

  /* Response */
  .response-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-bottom: 14px;
  }

  .response-meta .status-pill {
    padding: 3px 8px;
    border-radius: 5px;
    font-weight: 500;
  }

  .response-meta.success .status-pill {
    background: var(--success-soft);
    color: var(--success);
  }

  .response-meta.error .status-pill {
    background: var(--error-soft);
    color: var(--error);
  }

  .response-meta .timestamp {
    color: var(--ink-soft);
  }

  .response-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .response-header .card-title {
    margin-bottom: 0;
  }

  .retake-btn {
    background: none;
    border: none;
    color: var(--signal);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
  }

  .response-area {
    min-height: 96px;
  }

  .response-area.is-box {
    padding: 16px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    max-height: 420px;
    overflow: auto;
  }

  .response-text {
    margin: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .response-text .placeholder {
    color: #A3A6A3;
    font-family: 'Inter', sans-serif;
  }

  /* Loading spinner */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 32px 0;
  }

  .spinner {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 3px solid var(--line);
    border-top-color: var(--signal);
    flex-shrink: 0;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--ink-soft);
  }

  /* Quiz */
  .quiz-summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }

  .quiz-summary.all-done {
    color: var(--success);
  }

  .quiz-question {
    margin-bottom: 22px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--line);
  }

  .quiz-question:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }

  .quiz-q-num {
    color: var(--signal);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    margin-right: 8px;
  }

  .quiz-q-text {
    margin: 0 0 12px;
    font-size: 14.5px;
    font-weight: 500;
    line-height: 1.5;
  }

  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .quiz-option {
    text-align: left;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--paper);
    font-size: 13.5px;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .quiz-option:hover:not(:disabled) {
    border-color: var(--signal);
    background: var(--signal-soft);
  }

  .quiz-option:disabled {
    cursor: default;
  }

  .quiz-option.is-correct {
    border-color: var(--success);
    background: var(--success-soft);
    color: var(--success);
    font-weight: 500;
  }

  .quiz-option.is-incorrect {
    border-color: var(--error);
    background: var(--error-soft);
    color: var(--error);
    font-weight: 500;
  }

  .quiz-explanation {
    margin: 12px 0 0;
    padding: 10px 12px;
    background: var(--bg);
    border-left: 3px solid var(--signal);
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--ink-soft);
  }

  #response-card {
    margin-top: 4px;
  }

  a:focus-visible,
  button:focus-visible,
  input:focus-visible,
  label:focus-visible {
    outline: 2px solid var(--signal);
    outline-offset: 2px;
  }

  @media (max-width: 480px) {
    .page { padding: 40px 16px 72px; }
    h1 { font-size: 24px; }
    .card { padding: 20px; }
  }
</style>
</head>
<body>

<div class="page">

  <div class="intro">
    <p class="eyebrow">Webhook Relay</p>
    <h1>Send a text file. Watch what comes back.</h1>
    <p class="sub">Choose a .txt file and take the quiz that comes back.</p>
  </div>

  <section class="card" id="send-card">
    <h2 class="card-title">Send</h2>

    <label for="file-input" class="dropzone" id="dropzone" tabindex="0">
      <input type="file" id="file-input" accept=".txt,text/plain" hidden />
      <span class="dropzone-text" id="dropzone-text">Drop a .txt file here, or click to choose one</span>
    </label>
    <div class="field">
      <label for="webhook-url">Webhook URL</label>
      <input type="url" id="webhook-url" class="mono" placeholder="Please ask for the webhook URL" />
    </div>
    <div class="file-chip" id="file-chip" hidden>
      <span class="mono" id="file-name"></span>
      <button type="button" class="remove-btn" id="remove-file">Remove</button>
    </div>

    <div class="field">
      <p class="mode-hint" id="mode-hint">Sent as <code class="mono">multipart/form-data</code>.</p>
    </div>

    <button type="button" id="send-btn" class="send-btn" disabled>Send file</button>
  </section>

  <div class="connector" id="connector">
    <span class="connector-line"></span>
    <span class="connector-dot" id="connector-dot"></span>
    <span class="connector-label" id="connector-label">Idle</span>
    <span class="connector-line"></span>
  </div>

  <section class="card" id="response-card">
    <div class="response-header">
      <h2 class="card-title">Response</h2>
      <button type="button" class="retake-btn" id="retake-btn" hidden>Retake quiz</button>
    </div>
    <div class="response-meta" id="response-meta" hidden>
      <span class="status-pill" id="status-pill"></span>
      <span class="timestamp" id="timestamp"></span>
    </div>
    <div class="response-area is-box" id="response-area">
      <p class="response-text"><span class="placeholder">Nothing sent yet. The response will show up here.</span></p>
    </div>
  </section>

</div>

<script>
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('file-input');
  const dropzoneText = document.getElementById('dropzone-text');
  const fileChip = document.getElementById('file-chip');
  const fileNameEl = document.getElementById('file-name');
  const removeFileBtn = document.getElementById('remove-file');
  const sendBtn = document.getElementById('send-btn');
  const connector = document.getElementById('connector');
  const connectorLabel = document.getElementById('connector-label');
  const responseArea = document.getElementById('response-area');
  const retakeBtn = document.getElementById('retake-btn');
  const responseMeta = document.getElementById('response-meta');
  const statusPill = document.getElementById('status-pill');
  const timestampEl = document.getElementById('timestamp');

  let quizData = null;
  let answeredCount = 0;
  let scoreCount = 0;

  // TODO: replace with your actual webhook endpoint
  const WEBHOOK_URL = document.getElementById('webhook-url').value;

  let fileContent = null;
  let fileName = null;
  let selectedFile = null;
  const modeHint = document.getElementById('mode-hint');

  function updateModeHint() {
    const ext = fileName ? fileName.split('.').pop().toLowerCase() : 'txt';
    modeHint.innerHTML = `Sent as <code class="mono">multipart/form-data</code> with header <code class="mono">X-Content-Kind: file/${ext}</code>.`;
  }

  function updateSendState() {
    sendBtn.disabled = fileContent === null;
  }

  function setConnector(state, label) {
    connector.className = 'connector' + (state ? ' ' + state : '');
    connectorLabel.textContent = label;
  }

  function loadFile(file) {
    if (!file) return;
    const isTxt = file.name.toLowerCase().endsWith('.txt') || file.type === 'text/plain';
    if (!isTxt) {
      setConnector('error', 'Only .txt files are accepted');
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      fileContent = reader.result;
      fileName = file.name;
      selectedFile = file;
      fileNameEl.textContent = fileName;
      fileChip.hidden = false;
      dropzone.hidden = true;
      setConnector('', 'Idle');
      updateModeHint();
      updateSendState();
    };
    reader.onerror = () => {
      setConnector('error', 'Could not read that file');
    };
    reader.readAsText(file);
  }

  // Click / keyboard to open file picker
  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      fileInput.click();
    }
  });

  fileInput.addEventListener('change', (e) => {
    loadFile(e.target.files[0]);
  });

  // Drag and drop
  ['dragenter', 'dragover'].forEach(evt => {
    dropzone.addEventListener(evt, (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });
  });
  ['dragleave', 'drop'].forEach(evt => {
    dropzone.addEventListener(evt, (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
    });
  });
  dropzone.addEventListener('drop', (e) => {
    const file = e.dataTransfer.files[0];
    loadFile(file);
  });

  removeFileBtn.addEventListener('click', () => {
    fileContent = null;
    fileName = null;
    selectedFile = null;
    fileInput.value = '';
    fileChip.hidden = true;
    dropzone.hidden = false;
    updateSendState();
  });

  function showLoading() {
    responseArea.classList.remove('is-box');
    responseArea.innerHTML = `
      <div class="loading-state">
        <span class="spinner" aria-hidden="true"></span>
        <span class="loading-text">Waiting for response…</span>
      </div>`;
    retakeBtn.hidden = true;
  }

  function showText(text) {
    responseArea.classList.add('is-box');
    responseArea.innerHTML = '';
    const p = document.createElement('p');
    p.className = 'response-text';
    p.textContent = text;
    responseArea.appendChild(p);
    retakeBtn.hidden = true;
  }

  function updateQuizSummary(total) {
    const el = document.getElementById('quiz-summary');
    if (!el) return;
    if (answeredCount === 0) {
      el.textContent = `${total} question${total === 1 ? '' : 's'}`;
      el.classList.remove('all-done');
    } else if (answeredCount < total) {
      el.textContent = `${answeredCount} of ${total} answered · ${scoreCount} correct so far`;
      el.classList.remove('all-done');
    } else {
      el.textContent = `Done — ${scoreCount} of ${total} correct`;
      el.classList.add('all-done');
    }
  }

  function showQuiz(questions) {
    quizData = questions;
    answeredCount = 0;
    scoreCount = 0;

    responseArea.classList.remove('is-box');
    responseArea.innerHTML = '';

    const summary = document.createElement('div');
    summary.className = 'quiz-summary';
    summary.id = 'quiz-summary';
    responseArea.appendChild(summary);

    questions.forEach((q, i) => {
      const block = document.createElement('div');
      block.className = 'quiz-question';

      const qText = document.createElement('p');
      qText.className = 'quiz-q-text';
      const qNum = document.createElement('span');
      qNum.className = 'quiz-q-num';
      qNum.textContent = `Q${i + 1}`;
      qText.appendChild(qNum);
      qText.appendChild(document.createTextNode(q.question));
      block.appendChild(qText);

      const options = document.createElement('div');
      options.className = 'quiz-options';

      const explanation = document.createElement('p');
      explanation.className = 'quiz-explanation';
      explanation.textContent = q.explanation || '';
      explanation.hidden = true;

      (q.options || []).forEach(opt => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'quiz-option';
        btn.textContent = opt;
        btn.addEventListener('click', () => {
          const correct = opt === q.correct_answer;
          Array.from(options.children).forEach(b => { b.disabled = true; });
          btn.classList.add(correct ? 'is-correct' : 'is-incorrect');
          if (!correct) {
            const correctBtn = Array.from(options.children).find(b => b.textContent === q.correct_answer);
            if (correctBtn) correctBtn.classList.add('is-correct');
          }
          explanation.hidden = false;
          answeredCount++;
          if (correct) scoreCount++;
          updateQuizSummary(questions.length);
        });
        options.appendChild(btn);
      });

      block.appendChild(options);
      block.appendChild(explanation);
      responseArea.appendChild(block);
    });

    updateQuizSummary(questions.length);
    retakeBtn.hidden = false;
  }

  retakeBtn.addEventListener('click', () => {
    if (quizData) showQuiz(quizData);
  });

  sendBtn.addEventListener('click', async () => {
    if (fileContent === null) return;
    
    // FIX 1: Read the current value of the input box right when clicked
    const url = document.getElementById('webhook-url').value; 
    if (!url) {
      alert("Please enter a Webhook URL first.");
      return;
    }

    sendBtn.disabled = true;
    setConnector('sending', 'Sending…');
    responseMeta.hidden = true;
    retakeBtn.hidden = true;
    showLoading();

    try {
      const ext = (fileName.split('.').pop() || 'unknown').toLowerCase();
      const formData = new FormData();
      formData.append('file', selectedFile, fileName);
      
      // FIX 2: Move the metadata into FormData fields to avoid triggering an OPTIONS preflight
      formData.append('contentKind', `file/${ext}`);

      const res = await fetch(url, {
        method: 'POST',
        body: formData
        // Notice: headers object is removed completely. 
        // The browser will automatically manage Content-Type for FormData.
      });

      const raw = await res.text();
      const ok = res.ok;

      responseMeta.hidden = false;
      responseMeta.className = 'response-meta ' + (ok ? 'success' : 'error');
      statusPill.textContent = res.status + ' ' + res.statusText;
      timestampEl.textContent = new Date().toLocaleTimeString();

      let parsed = null;
      try { parsed = JSON.parse(raw); } catch (_) { /* not JSON */ }

      const questions = parsed && Array.isArray(parsed.questions) ? parsed.questions : null;

      if (ok && questions && questions.length) {
        showQuiz(questions);
        setConnector('success', 'Received');
      } else {
        const display = parsed !== null ? JSON.stringify(parsed, null, 2) : raw;
        showText(display.length ? display : '(empty response body)');
        setConnector(ok ? 'success' : 'error', ok ? 'Received' : 'Endpoint returned an error');
      }
    } catch (err) {
      responseMeta.hidden = false;
      responseMeta.className = 'response-meta error';
      statusPill.textContent = 'Network error';
      timestampEl.textContent = new Date().toLocaleTimeString();
      showText("Couldn't reach that endpoint. Check the URL and the endpoint's CORS settings.");
      setConnector('error', 'Failed to send');
    } finally {
      updateSendState();
    }
  });
</script>

</body>
</html>
